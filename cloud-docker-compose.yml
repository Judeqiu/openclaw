services:
  openclaw-gateway:
    image: openclaw:snapshot-20260220_221749
    # DNS workaround for cloud environments with Docker DNS issues
    extra_hosts:
      - "slack.com:3.0.66.145"
      - "wss-primary.slack.com:54.151.204.41"
      - "api.telegram.org:149.154.167.220"
      - "api.notion.com:208.103.161.1"
      - "smtp.gmail.com:142.251.10.108"
      - "www.googleapis.com:64.233.170.95"
      - "moltbook.com:13.33.45.90"
      - "google.com:142.251.10.138"
      - "github.com:20.205.243.166"
      - "cloudflare.com:104.16.132.229"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      # These are loaded from .env file
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      # Slack Socket Mode (optional)
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      # API Keys (add your own)
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      MEMORY_BOT_TOKEN: ${MEMORY_BOT_TOKEN:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      TWITTER_AUTH_TOKEN: ${TWITTER_AUTH_TOKEN:-}
      TWITTER_CT0: ${TWITTER_CT0:-}
    volumes:
      # Persistent storage for config and sessions
      - ~/.openclaw:/home/node/.openclaw
      - ~/.openclaw/workspace:/home/node/.openclaw/workspace
    ports:
      # Bind to all interfaces for remote access
      - "0.0.0.0:18789:18789"
      - "0.0.0.0:18790:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "0.0.0.0",
        "--port",
        "18789",
      ]
